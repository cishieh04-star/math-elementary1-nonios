<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看時間，轉時鐘</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 20px; 
            background: #FDF6E3; 
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        
        #homeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FDF6E3; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        .home-title { font-size: 3rem; font-weight: bold; color: #5D4037; }
        .enter-btn { font-size: 1.5rem; padding: 20px 40px; border-radius: 20px; background: #8D6E63; color: white; border: none; cursor: pointer; box-shadow: 0 6px #5D4037; }
        
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 500px; }
        .info-panel { background: #FFFFFF; padding: 20px; border-radius: 20px; text-align: center; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; }
        .target-text { font-size: 1.5rem; color: #5D4037; font-weight: bold; margin-bottom: 10px; }
        .time-display { font-size: 2rem; font-weight: bold; color: #4E342E; }
        
        .clock-container { width: 250px; height: 250px; border-radius: 50%; background: white; border: 10px solid #D7CCC8; position: relative; }
        .number { position: absolute; width: 40px; height: 40px; text-align: center; font-size: 20px; font-weight: bold; left: 50%; top: 50%; margin-left: -20px; margin-top: -20px; pointer-events: none; color: #3E2723; }
        
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; }
        .hour-hand { width: 8px; height: 70px; background: #3E2723; margin-left: -4px; z-index: 2; }
        .minute-hand { width: 5px; height: 110px; background: #BF360C; margin-left: -2.5px; z-index: 3; }
        
        .btn { background: #8D6E63; color: white; padding: 20px 40px; border-radius: 15px; border: none; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px #5D4037; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <div class="home-title">看時間，轉時鐘</div>
        <button class="enter-btn" onclick="enterGame()">按此進入遊戲</button>
    </div>

    <div class="main-container">
        <div class="info-panel" onclick="repeatTask()">
            <div class="target-text" id="targetText">現在是？</div>
            <div class="time-display" id="currentTime">目前時間：-- : --</div>
        </div>
        
        <div class="clock-container" id="clockFace">
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
        </div>
        
        <button class="btn" onclick="add10Min()">向前轉 10 分鐘</button>
    </div>

    <script>
        // 生成數字
        const clock = document.getElementById('clockFace');
        for(let i=1; i<=12; i++) {
            let angle = (i * 30) * (Math.PI / 180);
            let dist = 100;
            clock.innerHTML += `<div class="number" style="transform: translate(${Math.sin(angle)*dist}px, ${-Math.cos(angle)*dist}px)">${i}</div>`;
        }

        let exactMinutes = 0;
        let targetMins = 0;
        let lastTargetText = "";

        function speakText(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
        }

        function enterGame() {
            document.getElementById('homeScreen').style.display = 'none';
            generateNewTask();
        }

        function repeatTask() { speakText(lastTargetText); }

        function generateNewTask() {
            let currentTotalMins = Math.round(exactMinutes);
            let offset = (Math.floor(Math.random() * 3) + 1) * 10;
            targetMins = currentTotalMins + offset;
            
            let targetH = Math.floor((targetMins / 60) % 12) || 12;
            let targetM = targetMins % 60;
            
            lastTargetText = `請把時鐘轉到，${targetH}點${targetM === 0 ? "鐘" : targetM + "分"}`;
            document.getElementById('targetText').innerText = `請轉到：${targetH}點${targetM === 0 ? "鐘" : targetM + "分"}`;
            speakText(lastTargetText);
        }

        function updateDisplay() {
            document.getElementById('minuteHand').style.transform = `rotate(${exactMinutes * 6}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${(exactMinutes / 2)}deg)`;
            
            let totalMins = Math.floor(exactMinutes) % 720;
            let h = Math.floor(totalMins / 60) || 12;
            let m = totalMins % 60;
            
            document.getElementById('currentTime').innerText = `目前時間：${h} : ${m === 0 ? "00" : m}`;

            if (Math.round(exactMinutes) === targetMins) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                speakText("太棒了！答對了！");
                setTimeout(generateNewTask, 2000);
            }
        }

        function add10Min() {
            exactMinutes += 10;
            updateDisplay();
            let totalMins = Math.floor(exactMinutes) % 720;
            let h = Math.floor(totalMins / 60) || 12;
            let m = totalMins % 60;
            speakText(`現在是 ${h} 點 ${m === 0 ? "鐘" : m + "分"}`);
        }
    </script>
</body>
</html>
