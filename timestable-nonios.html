<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法學習遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        /* 統一盒模型設定 */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #fdf5e6; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #333; font-size: 2rem; margin: 20px 0; }
        
        #startScreen { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 50px; font-size: 28px; font-weight: bold; background-color: #ff7f50; color: white; border-radius: 50px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .start-btn:hover { transform: scale(1.05); }

        #gameScreen { display: none; width: 100%; max-width: 800px; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 3rem; margin: 20px 0; font-weight: bold; }
        .visual-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .group-box { border: 2px solid #ffa07a; border-radius: 10px; padding: 10px; display: grid; gap: 5px; background-color: #fff; }
        .dot { height: 15px; width: 15px; background-color: #ff6347; border-radius: 50%; }
        .box { width: 80px; height: 80px; border: 4px dashed #333; display: flex; align-items: center; justify-content: center; background: white; margin: 0 15px; border-radius: 15px; font-size: 2rem; }
        #options { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; width: 100%; }
        .option { padding: 20px; background: #98fb98; border-radius: 15px; font-weight: bold; font-size: 1.8rem; cursor: pointer; transition: background 0.3s; }
        .option:hover { background: #7cfc00; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>九九乘法遊戲</h1>
        <div class="start-btn" id="startBtn">開始遊戲</div>
    </div>

    <div id="gameScreen">
        <h1>請點選正確答案</h1>
        <div id="visualArea" class="visual-area"></div>
        <div class="equation-container">
            <div id="numA"></div> × <div id="numB"></div> ＝ <div class="box" id="dropTarget">?</div>
        </div>
        <div id="conceptText" style="color:#d2691e; font-size: 1.5rem; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options"></div>
    </div>

    <script>
        // 跨平台語音函數優化
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        document.getElementById('startBtn').onclick = () => {
            // 觸發音訊環境
            speak("遊戲開始");
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        };

        function generateQuestion() {
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            let numA = Math.floor(Math.random() * 8) + 2; 
            let numB = Math.floor(Math.random() * 8) + 2;
            let product = numA * numB;

            document.getElementById('numA').innerText = numA;
            document.getElementById('numB').innerText = numB;
            document.getElementById('conceptText').innerText = `（ ${numB} 個 ${numA} ）`;
            document.getElementById('dropTarget').innerText = '?';
            document.getElementById('dropTarget').style.backgroundColor = 'white';

            let visualHTML = '';
            let cols = Math.ceil(Math.sqrt(numA)); 
            for(let i = 0; i < numB; i++) { 
                visualHTML += `<div class="group-box" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                for(let j = 0; j < numA; j++) visualHTML += `<div class="dot"></div>`;
                visualHTML += `</div>`;
            }
            document.getElementById('visualArea').innerHTML = visualHTML;

            speak(`${numA} 乘以 ${numB} 等於多少呢？`);

            let options = [product];
            while(options.length < 6) {
                let fakeAns = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 8) + 2);
                if(!options.includes(fakeAns)) options.push(fakeAns);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    if (val === product) {
                        document.getElementById('dropTarget').innerText = val;
                        document.getElementById('dropTarget').style.backgroundColor = '#ffff99';
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        speak(`太棒了！${val}。答對了！`);
                        optionsDiv.style.pointerEvents = 'none';
                        setTimeout(generateQuestion, 2000);
                    } else {
                        speak("再試試看喔！");
                    }
                };
                optionsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
