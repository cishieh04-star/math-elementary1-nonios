<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>九九乘法學習遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #fdf5e6; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        h1 { color: #333; font-size: 1.5rem; margin: 10px 0; }
        
        #startScreen { height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; background-color: #ff7f50; color: white; border-radius: 20px; cursor: pointer; }

        #gameScreen { display: none; width: 100%; max-width: 600px; margin: 0 auto; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 2rem; margin: 10px 0; font-weight: bold; }
        .visual-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; min-height: 100px; }
        .group-box { border: 2px solid #ffa07a; border-radius: 8px; padding: 5px; display: grid; gap: 3px; background-color: #fff; }
        .dot { height: 12px; width: 12px; background-color: #ff6347; border-radius: 50%; }
        .box { width: 60px; height: 60px; border: 3px dashed #333; display: flex; align-items: center; justify-content: center; background: white; margin: 0 5px; border-radius: 10px; font-size: 1.5rem; }
        #options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .option { padding: 15px; background: #98fb98; border-radius: 10px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>九九乘法遊戲</h1>
        <div class="start-btn" id="startBtn">開始遊戲</div>
    </div>

    <div id="gameScreen">
        <h1>請點選正確答案</h1>
        <div id="visualArea" class="visual-area"></div>
        <div class="equation-container">
            <div id="numA"></div> × <div id="numB"></div> ＝ <div class="box" id="dropTarget">?</div>
        </div>
        <div id="conceptText" style="color:#d2691e; font-weight:bold; margin-bottom:10px;"></div>
        <div id="options"></div>
    </div>

    <script>
        // 核心語音函數
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        document.getElementById('startBtn').onclick = () => {
            // Android 必須透過互動觸發語音引擎
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        };

        function generateQuestion() {
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            let numA = Math.floor(Math.random() * 8) + 2; 
            let numB = Math.floor(Math.random() * 8) + 2;
            let product = numA * numB;

            document.getElementById('numA').innerText = numA;
            document.getElementById('numB').innerText = numB;
            document.getElementById('conceptText').innerText = `（ ${numB} 個 ${numA} ）`;
            document.getElementById('dropTarget').innerText = '?';
            document.getElementById('dropTarget').style.backgroundColor = 'white';

            // 視覺點點生成
            let visualHTML = '';
            let cols = Math.ceil(Math.sqrt(numA)); 
            for(let i = 0; i < numB; i++) { 
                visualHTML += `<div class="group-box" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                for(let j = 0; j < numA; j++) visualHTML += `<div class="dot"></div>`;
                visualHTML += `</div>`;
            }
            document.getElementById('visualArea').innerHTML = visualHTML;

            // 語音修正：使用「乘」字讓讀音更標準，避免機器人唸出怪怪的讀音
            speak(`${numA} 乘以 ${numB}，等於多少呢？`);

            // 生成選項
            let options = [product];
            while(options.length < 6) {
                let fakeAns = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 8) + 2);
                if(!options.includes(fakeAns)) options.push(fakeAns);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    if (val === product) {
                        document.getElementById('dropTarget').innerText = val;
                        document.getElementById('dropTarget').style.backgroundColor = '#ffff99';
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        speak(`太棒了！${val}。答對了！`);
                        optionsDiv.style.pointerEvents = 'none';
                        setTimeout(generateQuestion, 2000);
                    } else {
                        speak("再試試看喔！");
                    }
                };
                optionsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
