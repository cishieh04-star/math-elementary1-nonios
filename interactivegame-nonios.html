<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學題目練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        
        #startScreen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #fdf6e3; z-index: 999; display: flex; align-items: center; justify-content: center; }
        .start-btn { padding: 30px 60px; font-size: 24px; background: #ff69b4; color: white; border-radius: 20px; cursor: pointer; border: none; box-shadow: 0 6px #c71585; }

        .container { width: 100%; max-width: 600px; text-align: center; }
        .char-wrapper { display: inline-flex; align-items: center; justify-content: center; margin: 4px; padding: 8px 5px; background: white; border: 2px solid #8b4513; border-radius: 8px; cursor: pointer; width: 75px; height: 75px; }
        .char { font-size: 28px; font-weight: bold; margin-right: 2px; }
        .zhuyin-col { display: flex; flex-direction: column; font-size: 12px; color: #d35400; line-height: 1.1; width: 18px; }
        
        .slots-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; min-height: 70px; }
        .slot { width: 55px; height: 75px; border: 2px dashed #8b4513; background: #fff; border-radius: 8px; }
        
        .word-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 20px; }
        .hidden { visibility: hidden; }
        .audio-btn { padding: 15px 30px; font-size: 18px; background: #ff69b4; color: white; border: none; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="startScreen">
    <button class="start-btn" onclick="initGame()">點擊開始遊戲</button>
</div>

<div class="container">
    <h2>數學題目練習</h2>
    <button class="audio-btn" onclick="triggerSpeak()">🔊 聽題目</button>
    <div id="slots" class="slots-container"></div>
    <div id="word-pool" class="word-pool"></div>
</div>

<script>
    const levels = [
        { text: "有幾個已經跳出去了？", data: [{c:"有",z:"ㄧㄡˇ"},{c:"幾",z:"ㄐㄧˇ"},{c:"個",z:"˙ㄍㄜ"},{c:"已",z:"ㄧˇ"},{c:"經",z:"ㄐㄧㄥ"},{c:"跳",z:"ㄊㄧㄠˋ"},{c:"出",z:"ㄔㄨ"},{c:"去",z:"ㄑㄩˋ"},{c:"了",z:"˙ㄌㄜ"},{c:"？",z:""}] },
        { text: "還剩下幾隻鳥？", data: [{c:"還",z:"ㄏㄞˊ"},{c:"剩",z:"ㄕㄥˋ"},{c:"下",z:"ㄒㄧㄚˋ"},{c:"幾",z:"ㄐㄧˇ"},{c:"隻",z:"ㄓ"},{c:"鳥",z:"ㄋㄧㄠˇ"},{c:"？",z:""}] }
    ];

    let currentLevel = 0;

    // 核心語音函數：加強了 Android 的兼容性
    function speakText(text) {
        if (!('speechSynthesis' in window)) {
            console.error("您的瀏覽器不支援語音功能");
            return;
        }
        
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function initGame() {
        // 1. 先隱藏開始頁面
        document.getElementById('startScreen').style.display = 'none';
        
        // 2. 「喚醒」語音引擎：發送一個空語音訊號
        const wakeUp = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(wakeUp);
        
        // 3. 載入題目
        loadLevel();
    }

    function triggerSpeak() { speakText(levels[currentLevel].text); }

    function loadLevel() {
        const slotsDiv = document.getElementById('slots');
        const poolDiv = document.getElementById('word-pool');
        slotsDiv.innerHTML = '';
        poolDiv.innerHTML = '';
        
        levels[currentLevel].data.forEach(item => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.char = item.c;
            slotsDiv.appendChild(slot);
        });

        [...levels[currentLevel].data].sort(() => Math.random() - 0.5).forEach(item => {
            let div = document.createElement('div');
            div.className = 'char-wrapper';
            let zhuyinHTML = item.z.split('').map(char => `<span>${char}</span>`).join('');
            div.innerHTML = `<div class="char">${item.c}</div><div class="zhuyin-col">${zhuyinHTML}</div>`;
            
            div.onclick = function() {
                let emptySlot = Array.from(document.querySelectorAll('.slot')).find(s => !s.innerHTML);
                if (emptySlot && item.c === emptySlot.dataset.char) {
                    emptySlot.innerHTML = div.innerHTML;
                    div.style.visibility = 'hidden';
                    if (!document.querySelector('.slot:empty')) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        speakText("太棒了！答對了！");
                        setTimeout(() => { 
                            currentLevel = (currentLevel + 1) % levels.length; 
                            loadLevel(); 
                        }, 2000);
                    }
                }
            };
            poolDiv.appendChild(div);
        });
        
        // 延遲播放題目，確保 Android 聲音引擎已就緒
        setTimeout(triggerSpeak, 500);
    }
</script>
</body>
</html>
